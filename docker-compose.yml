version: '3.9'

services:
  db:
    image: postgres:16
    container_name: look_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 13265
      POSTGRES_DB: look_data
    ports:
      - '5497:5432'
    volumes:
      - baza_data:/var/lib/postgresql/data
  # redis:
  #   image: redis:7
  #   container_name: payment_redis
  #   restart: always
  #   ports:
  #     - '6381:6379'
  app:
    build: .
    container_name: look_backend
    restart: always
    env_file:
      - .env
    ports:
      - '3060:3000'
    depends_on:
      - db
      # - redis
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma db push --skip-generate &&
        npm run start:dev
      "
    environment:
      DATABASE_URL: postgres://postgres:13265@db:5432/look_data
      # REDIS_HOST: redis
      # REDIS_PORT: 6379

volumes:
  baza_data:
